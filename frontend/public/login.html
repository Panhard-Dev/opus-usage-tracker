<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar | IA Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-body">
    <div class="login-bg" aria-hidden="true">
      <span class="login-blob blob-1"></span>
      <span class="login-blob blob-2"></span>
      <span class="login-blob blob-3"></span>
    </div>

    <main class="login-wrap">
      <section class="login-card">
        <header class="login-brand">
          <span class="login-logo">IA</span>
          <div>
            <h1>IA Tracker</h1>
            <p>Acesso unico aos modelos via API key</p>
          </div>
        </header>

        <div class="login-tabs" role="tablist">
          <button type="button" class="login-tab is-active" data-tab="signin" role="tab">Entrar</button>
          <button type="button" class="login-tab" data-tab="signup" role="tab">Criar conta</button>
        </div>

        <form id="loginForm" class="login-form" autocomplete="on">
          <label class="login-field">
            <span>Email</span>
            <input id="loginEmail" type="email" required autocomplete="email" placeholder="voce@exemplo.com" />
          </label>
          <label class="login-field">
            <span>Senha</span>
            <input id="loginPassword" type="password" required minlength="6" autocomplete="current-password" placeholder="minimo 6 caracteres" />
          </label>
          <button type="submit" class="login-submit" id="loginSubmit">Entrar</button>
          <p class="login-message" id="loginMessage" role="status"></p>
        </form>

        <div class="login-divider"><span>ou</span></div>

        <button type="button" class="login-google" id="loginGoogle">
          <svg viewBox="0 0 18 18" width="16" height="16" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92a8.78 8.78 0 0 0 2.68-6.62z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.92v2.32A8.99 8.99 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.29-1.71V4.96H.92A9 9 0 0 0 0 9c0 1.45.35 2.82.92 4.04l3.05-2.33z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.93 8.93 0 0 0 9 0 8.99 8.99 0 0 0 .92 4.96l3.05 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
          </svg>
          Continuar com Google
        </button>

        <footer class="login-foot">
          <span>Ao continuar voce concorda com os termos de uso.</span>
        </footer>
      </section>
    </main>

    <script type="module" src="/login.js"></script>
  </body>
</html>
